name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: Which version of Noluma are you using?
      placeholder: "e.g. 0.3.3"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian Version
      description: Which version of Obsidian are you running?
      placeholder: "e.g. 1.7.7"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Affected Feature
      description: Which feature is affected?
      options:
        - Quick Ask
        - Inbox Processing
        - Vault Maintenance Scan
        - Maintenance Log / History
        - Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open Obsidian
        2. Run command "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: "Open Developer Console (Ctrl+Shift+I) → Console tab. Paste any errors here."
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, vault size, AI provider used, or anything else relevant.
    validations:
      required: false
